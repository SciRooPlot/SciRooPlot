name: Slides

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arial font
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ttf-mscorefonts-installer
          sudo fc-cache -f -v
          fc-match Arial

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDFs
        run: |
          typst compile docs/slides/slides.typ docs/slides/cpp.pdf --input lang=cpp
          typst compile docs/slides/slides.typ docs/slides/python.pdf --input lang=python

      - name: Commit generated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated slide PDFs"
          file_pattern: docs/slides/*.pdf
